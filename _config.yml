# GitHub Pages configuration
# Serves README.md as homepage + docs/ as subpages
# Theme: Cayman — clean, professional, blue/green header

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

title: "NEXUS — Learn SQL by Solving a Mystery"
description: >-
  A free game where you learn SQL by investigating corporate fraud.
  Write real queries against a live database. Uncover $1.87M in
  embezzlement. Includes a free SQL Foundations guide with examples
  and exercises for beginners.

url: "https://michaelnocito.github.io"
baseurl: "/nexus-sql-mystery"

# SEO
author: Michael Nocito
lang: en

# Don't include game source files in the site build
exclude:
  - core/
  - ui/
  - data/
  - main.py
  - requirements.txt
  - "*.py"
  - "*.pyc"
  - __pycache__/
  - .gitignore
